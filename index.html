<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="World Cup Arena — next match, schedule and stadium guide with +06 Dhaka timezone." />
  <title>World Cup Arena</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-2: #eef3f8;
      --card: rgba(255,255,255,.86);
      --text: #0b1424;
      --muted: #617085;
      --border: rgba(15,23,42,.12);
      --accent: #13b981;
      --accent-2: #38bdf8;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 18px 50px rgba(15,23,42,.12);
    }

    html.dark {
      --bg: #07111f;
      --surface: #0c1626;
      --surface-2: #111d31;
      --card: rgba(13,23,39,.86);
      --text: #f8fafc;
      --muted: #96a4b8;
      --border: rgba(148,163,184,.16);
      --accent: #4ade80;
      --accent-2: #38bdf8;
      --shadow: 0 18px 55px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Bengali", "Noto Sans Devanagari", "Noto Nastaliq Urdu", Arial, sans-serif;
      background:
        radial-gradient(circle at 50% -10%, color-mix(in srgb, var(--accent-2) 22%, transparent), transparent 24rem),
        radial-gradient(circle at 95% 8%, color-mix(in srgb, var(--accent) 15%, transparent), transparent 18rem),
        linear-gradient(180deg, color-mix(in srgb, var(--bg) 94%, #000), var(--bg));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(color-mix(in srgb, var(--border) 55%, transparent) 1px, transparent 1px),
        linear-gradient(90deg, color-mix(in srgb, var(--border) 55%, transparent) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.36), transparent 70%);
      z-index: -1;
    }

    button, select, input { font: inherit; }
    button { cursor: pointer; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    [hidden] { display: none !important; }

    .shell {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding-bottom: 42px;
    }

    .appbar {
      position: sticky;
      top: 10px;
      z-index: 50;
      margin: 10px auto 0;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: color-mix(in srgb, var(--card) 92%, transparent);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .appbar-inner {
      display: grid;
      grid-template-columns: auto minmax(170px, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 9px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
      border-radius: 13px;
      position: relative;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 26px color-mix(in srgb, var(--accent-2) 24%, transparent);
    }

    .logo::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 2px solid rgba(255,255,255,.82);
      border-radius: 50%;
    }

    .logo::after {
      content: "";
      position: absolute;
      width: 36px;
      height: 2px;
      left: 1px;
      top: 18px;
      background: rgba(255,255,255,.82);
      transform: rotate(-26deg);
      border-radius: 999px;
    }

    .brand-text { min-width: 0; }
    .brand-text strong {
      display: block;
      font-size: .98rem;
      line-height: 1;
      letter-spacing: -.02em;
      white-space: nowrap;
    }
    .brand-text span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: .67rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .tabs {
      justify-self: center;
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: color-mix(in srgb, var(--surface-2) 72%, transparent);
    }

    .tab {
      border: 0;
      border-radius: 10px;
      padding: 8px 13px;
      color: var(--muted);
      background: transparent;
      font-size: .82rem;
      font-weight: 900;
      transition: 160ms ease;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: #062015;
      background: linear-gradient(135deg, #86efac, #67e8f9);
    }

    .tools {
      justify-self: end;
      display: grid;
      grid-template-columns: 120px 92px 38px;
      align-items: center;
      gap: 6px;
    }

    .select, .input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      background: color-mix(in srgb, var(--surface) 72%, transparent);
      outline: none;
      padding: 0 10px;
      font-size: .78rem;
      font-weight: 800;
    }
    .select:focus, .input:focus {
      border-color: color-mix(in srgb, var(--accent-2) 68%, var(--border));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-2) 16%, transparent);
    }
    .select option { background: var(--surface); color: var(--text); }

    .theme-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      background: color-mix(in srgb, var(--surface) 72%, transparent);
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    main { padding-top: 18px; }

    .next-card {
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: clamp(18px, 3vw, 28px);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--card) 94%, transparent), color-mix(in srgb, var(--surface-2) 74%, transparent)),
        radial-gradient(circle at top right, color-mix(in srgb, var(--accent-2) 13%, transparent), transparent 25rem);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .next-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 30px;
      border: 1px solid color-mix(in srgb, var(--accent) 36%, var(--border));
      border-radius: 999px;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      padding: 6px 10px;
      font-size: .72rem;
      font-weight: 950;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 14px currentColor;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      background: color-mix(in srgb, var(--surface-2) 72%, transparent);
      padding: 6px 10px;
      font-size: .74rem;
      font-weight: 850;
    }

    .match-title {
      margin: 0 0 18px;
      font-size: clamp(1.65rem, 4.8vw, 3.7rem);
      line-height: 1.02;
      letter-spacing: -.06em;
      font-weight: 950;
    }
    .accent-text {
      color: transparent;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 92px minmax(0, 1fr);
      align-items: center;
      gap: 14px;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px;
      background: color-mix(in srgb, var(--surface-2) 64%, transparent);
    }

    .team-box {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .team-box.away { justify-content: flex-end; text-align: right; }

    .flag {
      width: 52px;
      height: 52px;
      flex: 0 0 52px;
      border-radius: 17px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: .74rem;
      font-weight: 950;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.24), 0 10px 22px rgba(0,0,0,.16);
    }

    .team-name {
      display: block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: clamp(1.05rem, 2.6vw, 1.8rem);
      font-weight: 950;
      line-height: 1.05;
      letter-spacing: -.035em;
    }
    .team-code {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: .72rem;
      font-weight: 900;
      letter-spacing: .08em;
    }

    .vs-box {
      min-height: 66px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: #052e2b;
      background: linear-gradient(135deg, #dcfce7, #bae6fd);
      font-size: 1.3rem;
      font-weight: 950;
      letter-spacing: -.04em;
      text-transform: uppercase;
    }

    .match-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .meta {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      background: color-mix(in srgb, var(--surface) 54%, transparent);
    }
    .meta small {
      display: block;
      color: var(--muted);
      font-size: .65rem;
      font-weight: 950;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .meta strong {
      display: block;
      font-size: .92rem;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .btn {
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 13px;
      color: var(--text);
      background: color-mix(in srgb, var(--surface) 68%, transparent);
      padding: 10px 14px;
      font-size: .86rem;
      font-weight: 900;
      transition: 160ms ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: color-mix(in srgb, var(--accent-2) 45%, var(--border)); }
    .btn.primary { color: #052e2b; border: 0; background: linear-gradient(135deg, #86efac, #67e8f9); }

    .panel { margin-top: 18px; }
    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin: 0 0 12px;
    }
    .section-head h2 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2.1rem);
      line-height: 1;
      letter-spacing: -.04em;
    }
    .section-head p { margin: 6px 0 0; color: var(--muted); font-size: .92rem; }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 120px;
      gap: 8px;
      margin-bottom: 12px;
    }

    .date-group {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: color-mix(in srgb, var(--card) 86%, transparent);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .date-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: .82rem;
      font-weight: 900;
    }

    .match-list { display: grid; gap: 8px; padding: 10px; }
    .match-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) minmax(130px, .75fr);
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: color-mix(in srgb, var(--surface) 58%, transparent);
      padding: 11px;
    }
    .match-team { min-width: 0; font-size: .92rem; font-weight: 950; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .match-team.away { text-align: right; }
    .match-vs { color: var(--muted); font-size: .78rem; font-weight: 900; }
    .match-info { color: var(--muted); font-size: .78rem; text-align: right; line-height: 1.35; }
    .status { color: var(--accent); font-weight: 950; }
    .status.ft { color: var(--warning); }

    .stadium-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .stadium-card {
      border: 1px solid var(--border);
      border-radius: 20px;
      background: color-mix(in srgb, var(--card) 88%, transparent);
      padding: 14px;
    }
    .stadium-card h3 { margin: 0; font-size: 1rem; letter-spacing: -.02em; }
    .stadium-card p { margin: 6px 0 12px; color: var(--muted); font-size: .86rem; }
    .capacity { display: inline-flex; border-radius: 999px; padding: 6px 9px; color: #052e2b; background: linear-gradient(135deg, #86efac, #67e8f9); font-size: .78rem; font-weight: 950; }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 18px;
      color: var(--muted);
      padding: 24px;
      text-align: center;
      background: color-mix(in srgb, var(--card) 72%, transparent);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      place-items: center;
      padding: 16px;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(14px);
    }
    .modal-backdrop.open { display: grid; }
    .modal {
      width: min(560px, 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--surface);
      box-shadow: 0 28px 80px rgba(0,0,0,.38);
      overflow: hidden;
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .modal-head h3 { margin: 0; font-size: 1.2rem; }
    .modal-head p { margin: 5px 0 0; color: var(--muted); }
    .close-btn { width: 36px; height: 36px; border-radius: 12px; border: 1px solid var(--border); color: var(--text); background: var(--surface-2); }
    .modal-body { padding: 16px; display: grid; gap: 10px; }
    .fact { display: flex; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .fact span { color: var(--muted); }
    .fact strong { text-align: right; }

    html[dir="rtl"] body { text-align: right; }
    html[dir="rtl"] .team-box.away { text-align: left; }
    html[dir="rtl"] .match-team.away, html[dir="rtl"] .match-info { text-align: left; }

    @media (max-width: 900px) {
      .shell { width: min(100% - 18px, 1120px); }
      .appbar { top: 0; margin-top: 0; border-radius: 0 0 16px 16px; }
      .appbar-inner { grid-template-columns: 1fr; gap: 7px; padding: 8px; }
      .brand { min-height: 32px; }
      .logo { width: 32px; height: 32px; flex-basis: 32px; border-radius: 10px; }
      .logo::before { inset: 6px; }
      .logo::after { width: 30px; top: 15px; }
      .brand-text strong { font-size: .88rem; }
      .brand-text span { display: none; }
      .tools { order: 2; justify-self: stretch; grid-template-columns: minmax(0, 1fr) 86px 34px; gap: 5px; }
      .select { min-height: 34px; height: 34px; border-radius: 10px; padding: 0 7px; font-size: .68rem; }
      .theme-btn { width: 34px; height: 34px; border-radius: 10px; }
      .tabs { order: 3; justify-self: stretch; width: 100%; height: 34px; padding: 3px; border-radius: 11px; }
      .tab { flex: 1; padding: 6px 8px; font-size: .72rem; border-radius: 8px; }
      main { padding-top: 10px; }
      .next-card { border-radius: 20px; padding: 13px; }
      .next-top { margin-bottom: 10px; gap: 6px; }
      .label, .chip { min-height: 25px; padding: 4px 7px; font-size: .58rem; letter-spacing: .06em; }
      .match-title { font-size: 1.38rem; margin-bottom: 11px; letter-spacing: -.04em; }
      .scoreboard { grid-template-columns: minmax(0,1fr) 46px minmax(0,1fr); gap: 7px; border-radius: 15px; padding: 10px; }
      .team-box, .team-box.away { flex-direction: column; justify-content: center; text-align: center; gap: 5px; }
      .team-box.away .flag { order: -1; }
      .flag { width: 34px; height: 34px; flex-basis: 34px; border-radius: 11px; font-size: .58rem; }
      .team-name { font-size: .82rem; letter-spacing: -.015em; }
      .team-code { display: none; }
      .vs-box { min-height: 38px; border-radius: 12px; font-size: .8rem; }
      .match-meta { grid-template-columns: 1fr; gap: 6px; margin-top: 9px; }
      .meta { padding: 8px 9px; border-radius: 11px; }
      .meta small { font-size: .55rem; margin-bottom: 4px; }
      .meta strong { font-size: .8rem; }
      .actions { display: grid; grid-template-columns: 1fr; gap: 7px; margin-top: 9px; }
      .btn { min-height: 36px; border-radius: 10px; font-size: .78rem; padding: 8px 10px; }
      .section-head { margin-bottom: 9px; padding: 0 2px; }
      .section-head h2 { font-size: 1.2rem; }
      .section-head p { display: none; }
      .search-row { grid-template-columns: 1fr; }
      .match-row { grid-template-columns: minmax(0,1fr) auto minmax(0,1fr); }
      .match-info { grid-column: 1 / -1; text-align: left; }
      html[dir="rtl"] .match-info { text-align: right; }
      .stadium-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 360px) {
      .tools { grid-template-columns: minmax(0, 1fr) 78px 32px; }
      .select { font-size: .64rem; padding: 0 5px; }
      .theme-btn { width: 32px; }
      .match-title { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="appbar">
      <div class="appbar-inner">
        <div class="brand" aria-label="World Cup Arena">
          <span class="logo" aria-hidden="true"></span>
          <span class="brand-text">
            <strong>World Cup Arena</strong>
            <span data-i18n="subtitle">Schedule + Stadium Guide</span>
          </span>
        </div>

        <nav class="tabs" aria-label="Sections">
          <button class="tab active" type="button" data-tab="schedule" data-i18n="schedule">Schedule</button>
          <button class="tab" type="button" data-tab="stadiums" data-i18n="stadiums">Stadiums</button>
        </nav>

        <div class="tools">
          <select id="timezoneSelect" class="select" aria-label="Timezone">
            <option value="Asia/Dhaka">+06 Dhaka</option>
            <option value="UTC">GMT / UTC</option>
            <option value="Europe/London">London</option>
            <option value="America/New_York">New York</option>
            <option value="America/Los_Angeles">Los Angeles</option>
            <option value="Asia/Bangkok">ICT Bangkok</option>
            <option value="Asia/Dubai">Dubai</option>
            <option value="Asia/Tokyo">Tokyo</option>
          </select>

          <select id="languageSelect" class="select" aria-label="Language">
            <option value="en">English</option>
            <option value="bn">বাংলা</option>
            <option value="hi">हिन्दी</option>
            <option value="ur">اردو</option>
          </select>

          <button id="themeToggle" class="theme-btn" type="button" aria-label="Toggle theme">☾</button>
        </div>
      </div>
    </header>

    <main>
      <section id="nextMatch" class="next-card" aria-live="polite">
        <div class="next-top">
          <span class="label"><span class="dot"></span><span data-i18n="nextMatch">Next Match</span></span>
          <span id="tzChip" class="chip">+06 Dhaka</span>
        </div>
        <h1 class="match-title" data-i18n="loading">Loading match…</h1>
      </section>

      <section id="schedulePanel" class="panel">
        <div class="section-head">
          <div>
            <h2 data-i18n="scheduleTitle">Upcoming Schedule</h2>
            <p data-i18n="scheduleHint">Clean fixture list in your selected timezone.</p>
          </div>
          <span id="countChip" class="chip">0</span>
        </div>
        <div class="search-row">
          <input id="searchInput" class="input" type="search" placeholder="Search team or stadium" data-i18n-placeholder="search" />
          <button id="refreshBtn" class="btn primary" type="button" data-i18n="refresh">Refresh</button>
        </div>
        <div id="scheduleList"></div>
      </section>

      <section id="stadiumsPanel" class="panel" hidden>
        <div class="section-head">
          <div>
            <h2 data-i18n="stadiumTitle">Stadium Guide</h2>
            <p data-i18n="stadiumHint">Host stadiums, cities and capacities.</p>
          </div>
        </div>
        <div id="stadiumGrid" class="stadium-grid"></div>
      </section>
    </main>
  </div>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div>
          <h3 id="modalTitle">Stadium</h3>
          <p id="modalSubtitle">City</p>
        </div>
        <button id="modalClose" class="close-btn" type="button">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    (() => {
      'use strict';

      const CONFIG = {
        defaultTimezone: 'Asia/Dhaka',
        pollMs: 60000,
        gamesUrl: 'https://worldcup26.ir/get/games',
        stadiumsUrl: 'https://worldcup26.ir/get/stadiums',
        storage: {
          timezone: 'wca-tz-v2',
          language: 'wca-lang-v2',
          theme: 'wca-theme-v2'
        }
      };

      const FALLBACK_DATA = {
        stadiums: [

      async function fetchJson(url) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 8000);
        try {
          const response = await fetch(url, { cache: 'no-store', signal: controller.signal, headers: { Accept: 'application/json' }});
          if (!response.ok) throw new Error(response.statusText);
          return response.json();
        } finally {
          clearTimeout(timeout);
        }

      function normalize(games, stadiums) {

          const stadiumId = String(g.stadium_id || '');
          const stadium = stadiumMap.get(stadiumId) || { id: stadiumId, name:'TBA Stadium', city:'TBA', country:'', capacity:0 };

          const home = g.home_team_name_en || g.home_team_label || 'TBD';

            status,
            score: status === 'UPCOMING' ? null : { home: Number(g.home_score || 0), away: Number(g.away_score || 0) }

      function renderSchedule() {

        const map = { Brazil:'BRA', Japan:'JPN', Germany:'GER', Paraguay:'PAR', Netherlands:'NED', Morocco:'MAR', France:'FRA', Sweden:'SWE', Mexico:'MEX', Ecuador:'ECU', England:'ENG', Belgium:'BEL', Senegal:'SEN', 'United States':'USA', 'Ivory Coast':'CIV', Norway:'NOR', 'Democratic Republic of the Congo':'COD', 'Bosnia and Herzegovina':'BIH' };

        const finished = String(g.finished || '').toUpperCase() === 'TRUE';

      function parseKickoff(localDate, stadiumId) {

        const [, mo, d, y, h, mi] = m.map(Number);

      function stadiumOffset(id) {
